<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Som' — Parlez à votre cave</title>
<meta name="description" content="Votre cave à vin vous parle : inventaire à la voix, accords mets-vins, alertes et rachats malins.">
<meta name="theme-color" content="#120a0d">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="voute" aria-hidden="true"></div>

<header class="entete">
  <button class="avatar-entete" id="avatar-entete" aria-label="Mon profil">
    <span id="avatar-init">XG</span>
  </button>
  <div class="entete-arche">
    <h1 class="marque">Som'</h1>
    <p class="devise">— votre cave vous parle —</p>
  </div>
</header>

<main id="ecrans">

  <!-- ═══ CAVE ═══ -->
  <section class="ecran" id="ecran-cave" hidden>
    <div class="segmente" id="categorie-cave">
      <button class="seg actif" data-cat="vin"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h10c0 5.2-2 8.5-5 8.5S7 8.2 7 3Z"/><path d="M12 11.5V19M8.5 21h7"/></svg> Vins</button>
      <button class="seg" data-cat="spiritueux"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3h4v3.5L15.5 9v10a2 2 0 0 1-2 2h-3a2 2 0 0 1-2-2V9L10 6.5V3Z"/><path d="M8.5 14h7"/></svg> Spiritueux</button>
    </div>
    <div class="bandeau-valeur" id="bandeau-valeur"></div>
    <div class="barre-recherche">
      <input type="search" id="recherche" placeholder="Chercher une bouteille, une région…" autocomplete="off">
    </div>
    <div class="filtres" id="filtres-couleur"></div>
    <div id="liste-cave"></div>
  </section>

  <!-- ═══ AJOUTER ═══ -->
  <section class="ecran" id="ecran-ajouter" hidden>
    <div class="segmente" id="categorie-ajout">
      <button class="seg actif" data-cat="vin"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h10c0 5.2-2 8.5-5 8.5S7 8.2 7 3Z"/><path d="M12 11.5V19M8.5 21h7"/></svg> Vin</button>
      <button class="seg" data-cat="spiritueux"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3h4v3.5L15.5 9v10a2 2 0 0 1-2 2h-3a2 2 0 0 1-2-2V9L10 6.5V3Z"/><path d="M8.5 14h7"/></svg> Spiritueux</button>
    </div>
    <div class="segmente" id="modes-ajout">
      <button class="seg actif" data-mode="photo"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h2.5L8 6h8l1.5 2H20a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"/><circle cx="12" cy="13.5" r="3.5"/></svg> Photo</button>
      <button class="seg" data-mode="voix"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg> Voix</button>
      <button class="seg" data-mode="texte"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l1-4L16.5 4.5a2.12 2.12 0 0 1 3 3L8 19l-4 1Z"/></svg> Texte</button>
      <button class="seg" data-mode="forme"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg> Fiche</button>
    </div>

    <div class="mode-panneau" id="panneau-texte" hidden>
      <textarea id="saisie-texte" rows="4" placeholder="Ex : 3 bouteilles de Gevrey-Chambertin 2019 domaine Dugat, 65€&#10;Sancerre blanc 2022, 18 euros&#10;Champagne Bollinger, x2"></textarea>
      <button class="btn-or" id="btn-analyser-texte">Analyser</button>
    </div>

    <div class="mode-panneau" id="panneau-voix" hidden>
      <button class="micro" id="btn-micro" aria-label="Dicter">
        <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>
      </button>
      <p class="micro-aide" id="micro-aide">Touchez et dictez : « deux bouteilles de Chinon 2020, quinze euros »</p>
      <p class="transcript" id="transcript-ajout"></p>
    </div>

    <div class="mode-panneau" id="panneau-photo">
      <label class="zone-photo" for="input-photo">
        <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 8h2.5L8 6h8l1.5 2H20a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"/><circle cx="12" cy="13.5" r="3.5"/></svg>
        <span>Photographier les étiquettes</span>
        <small>une ou plusieurs photos — jusqu'à 10 d'un coup</small>
        <input type="file" id="input-photo" accept="image/*" multiple hidden>
      </label>
      <p class="note-ia" id="note-photo-ia"></p>
    </div>

    <div class="mode-panneau" id="panneau-fiche-vin" hidden>
      <div class="ligne-form">
        <div style="flex:1.6"><label>Nom / cuvée</label><input id="fv-nom" placeholder="Château Sociando-Mallet…"></div>
        <div style="flex:.7"><label>Millésime</label><input id="fv-mil" type="number" placeholder="2019"></div>
      </div>
      <div class="ligne-form">
        <div style="flex:1"><label>Domaine / producteur</label><input id="fv-domaine"></div>
        <div style="flex:1"><label>Appellation</label><input id="fv-appellation" placeholder="Haut-Médoc…"></div>
      </div>
      <div class="ligne-form">
        <div style="flex:1"><label>Pays</label><select id="fv-pays" data-pays></select></div>
        <div style="flex:1"><label>Région</label><select id="fv-region" data-region></select></div>
        <div style="flex:1"><label>Couleur</label><select id="fv-couleur"></select></div>
      </div>
      <div class="ligne-form">
        <div style="flex:1"><label>Prix (€)</label><input id="fv-prix" type="number" step="0.5"></div>
        <div style="flex:1"><label>Quantité</label><input id="fv-qty" type="number" min="1" value="1"></div>
        <div style="flex:1"><label>Format</label><select id="fv-format"></select></div>
      </div>
      <button class="btn-or" id="btn-analyser-fiche-vin">Analyser</button>
    </div>

    <div class="mode-panneau" id="panneau-spiritueux" hidden>
      <div class="ligne-form">
        <div style="flex:1"><label>Type</label><select id="sp-type"></select></div>
        <div style="flex:1.4"><label>Marque / distillerie</label><input id="sp-marque" placeholder="Ardbeg, Clément…"></div>
      </div>
      <div class="ligne-form">
        <div style="flex:1.6"><label>Nom / expression</label><input id="sp-nom" placeholder="10 ans, Uigeadail, XO…"></div>
        <div style="flex:.7"><label>Âge (ans)</label><input id="sp-age" type="number" min="0"></div>
        <div style="flex:.7"><label>% vol</label><input id="sp-alcool" type="number" step="0.1"></div>
      </div>
      <div class="ligne-form">
        <div style="flex:1"><label>Pays</label><select id="sp-pays"></select></div>
        <div style="flex:.8"><label>Prix (€)</label><input id="sp-prix" type="number" step="0.5"></div>
        <div style="flex:.7"><label>Quantité</label><input id="sp-qty" type="number" min="1" value="1"></div>
      </div>
      <button class="btn-or" id="btn-analyser-spirit">Analyser</button>
    </div>

    <div id="apercu-ajout"></div>
  </section>

  <!-- ═══ SOMMELIER ═══ -->
  <section class="ecran" id="ecran-sommelier" hidden>
    <!-- Scène immersive : la simulation fluide occupe presque tout l'écran.
         Tap sur la matière → dictée ; glisser → remous (interaction native). -->
    <div class="scene-fluide" id="orbe-scene">
      <div class="toile-fluide" id="orbe" data-etat="repos" role="button" aria-label="Parler au sommelier" tabindex="0">
        <canvas class="fluide-canvas"></canvas>
      </div>
      <p class="fluide-statut" id="orbe-statut">Touchez le micro et dites votre repas</p>
      <!-- la transcription apparaît en sous-titres, comme au cinéma -->
      <div class="sous-titres" id="orbe-transcript" aria-live="polite"></div>
      <div class="fluide-outils">
        <!-- LE bouton : parler au sommelier (le tap sur l'encre ne sert qu'à jouer) -->
        <button class="micro-fluide" id="btn-micro-sommelier" aria-label="Parler au sommelier">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>
        </button>
        <div class="chips-inspi" id="chips-inspi"></div>
        <div class="segmente segmente-verre" id="occasions">
          <button class="seg" data-occ="semaine">Semaine</button>
          <button class="seg actif" data-occ="weekend">Week-end</button>
          <button class="seg" data-occ="grande">Grande occasion</button>
        </div>
        <label class="budget-fluide">
          <span>Budget</span>
          <input type="range" id="budget-max" min="10" max="210" step="10" value="210">
          <b id="budget-aff">libre</b>
        </label>
        <div class="rangee-outils">
          <button class="outil-pilule" id="lien-ecrire">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l1-4L16.5 4.5a2.12 2.12 0 0 1 3 3L8 19l-4 1Z"/></svg>
            Écrire
          </button>
          <button class="outil-pilule" id="btn-surprise">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3.5"/><circle cx="9" cy="9" r="1.15" fill="currentColor" stroke="none"/><circle cx="15" cy="9" r="1.15" fill="currentColor" stroke="none"/><circle cx="9" cy="15" r="1.15" fill="currentColor" stroke="none"/><circle cx="15" cy="15" r="1.15" fill="currentColor" stroke="none"/></svg>
            Surprise
          </button>
        </div>
      </div>
    </div>

    <div class="champ-repas" id="bloc-ecrire" hidden>
      <textarea id="saisie-repas" rows="2" placeholder="Ex : côte de bœuf grillée et cèpes…"></textarea>
      <button class="micro-mini btn-envoi" id="btn-conseiller" aria-label="Demander conseil">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V6m-6 6l6-6 6 6"/></svg>
      </button>
    </div>

    <div id="resultats-sommelier"></div>
    <div class="historique-sommelier" id="historique-sommelier"></div>
  </section>

  <!-- ═══ ALERTES ═══ -->
  <section class="ecran" id="ecran-alertes" hidden>
    <div id="liste-alertes"></div>
    <h3 class="sous-titre">Mes veilles</h3>
    <div id="liste-veilles"></div>
    <form class="forme-veille" id="forme-veille">
      <select id="veille-type">
        <option value="region">Région</option>
        <option value="millesime">Millésime</option>
        <option value="reference">Référence</option>
      </select>
      <span id="veille-valeur-slot"></span>
      <input type="number" id="veille-seuil" min="1" value="3" aria-label="Seuil">
      <button class="btn-or" type="submit">Veiller</button>
    </form>
  </section>

  <!-- ═══ STATS ═══ -->
  <section class="ecran" id="ecran-stats" hidden>
    <div class="segmente" id="vue-stats">
      <button class="seg actif" data-vue="chiffres">Chiffres</button>
      <button class="seg" data-vue="carte"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2Z"/><path d="M9 4v14M15 6v14"/></svg> Carte</button>
    </div>
    <div id="contenu-stats"></div>
    <div id="contenu-carte" hidden></div>
  </section>

  <!-- ═══ PROFIL ═══ -->
  <section class="ecran" id="ecran-profil" hidden>
    <button class="retour-profil" id="btn-retour-profil" aria-label="Retour">‹ Retour</button>
    <div id="contenu-profil"></div>
  </section>

</main>

<!-- Navigation -->
<nav class="nav" aria-label="Navigation principale">
  <button class="nav-item" data-ecran="cave" aria-label="Cave">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 21V10a9 7 0 0 1 18 0v11M3 21h18M7 21v-6h4v6m4-9h2"/></svg>
    <span>Cave</span>
  </button>
  <button class="nav-item" data-ecran="ajouter" aria-label="Ajouter">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    <span>Ajouter</span>
  </button>
  <button class="nav-item nav-central" data-ecran="sommelier" aria-label="Sommelier">
    <span class="pastille-sommelier">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 3h8l-.6 6a3.4 3.4 0 0 1-6.8 0L8 3ZM12 12.5V20m-4 1h8"/><path d="M8.4 7h7.2" opacity=".5"/></svg>
    </span>
    <span>Sommelier</span>
  </button>
  <button class="nav-item" data-ecran="alertes" aria-label="Alertes">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6Zm4 9a2 2 0 0 0 4 0"/></svg>
    <span>Alertes</span>
    <span class="badge-nav" id="badge-alertes" hidden></span>
  </button>
  <button class="nav-item" data-ecran="stats" aria-label="Statistiques">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 20V10m6 10V4m6 16v-7m4 7H2"/></svg>
    <span>Stats</span>
  </button>
</nav>

<!-- Fiche bouteille (bottom sheet) -->
<div class="voile" id="voile" hidden></div>
<div class="feuille" id="feuille" hidden role="dialog" aria-modal="true">
  <div class="feuille-poignee" id="feuille-poignee">
    <span class="poignee-barre"></span>
    <button class="feuille-fermer" id="feuille-fermer" aria-label="Fermer">✕</button>
  </div>
  <div id="feuille-contenu"></div>
</div>

<div class="toasts" id="toasts" aria-live="polite"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
